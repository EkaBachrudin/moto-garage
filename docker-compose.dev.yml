services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: moto-garage-postgres-dev
    environment:
      POSTGRES_USER: ${DB_USER:-moto_garage}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-moto_garage_password}
      POSTGRES_DB: ${DB_NAME:-moto_garage}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - moto-garage-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-moto_garage}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./moto-garage-be
      target: development
    container_name: moto-garage-backend-dev
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-moto_garage}
      DB_PASSWORD: ${DB_PASSWORD:-moto_garage_password}
      DB_NAME: ${DB_NAME:-moto_garage}
    ports:
      - "3000:3000"
    volumes:
      - ./moto-garage-be/src:/app/src:ro
      - ./moto-garage-be/package.json:/app/package.json:ro
    networks:
      - moto-garage-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./moto-garage-fe
      target: development
    container_name: moto-garage-frontend-dev
    environment:
      VITE_API_URL: http://localhost:8080/api
    ports:
      - "5173:5173"
    volumes:
      - ./moto-garage-fe/src:/app/src:ro
      - ./moto-garage-fe/public:/app/public:ro
      - ./moto-garage-fe/index.html:/app/index.html:ro
      - ./moto-garage-fe/package.json:/app/package.json:ro
      - ./moto-garage-fe/vite.config.ts:/app/vite.config.ts:ro
    networks:
      - moto-garage-network
    depends_on:
      - backend
    restart: unless-stopped

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: moto-garage-nginx-dev
    ports:
      - "8080:80"
    volumes:
      - ./docker/development/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - moto-garage-network
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_dev_data:
    driver: local

networks:
  moto-garage-network:
    driver: bridge
